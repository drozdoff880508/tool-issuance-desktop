name: Build Portable EXE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download Node.js portable
        shell: pwsh
        run: |
          $nodeVersion = "20.18.0"
          $url = "https://nodejs.org/dist/v$nodeVersion/node-v$nodeVersion-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive -Path node.zip -DestinationPath .
          Rename-Item -Path "node-v$nodeVersion-win-x64" -NewName "node"
          Remove-Item node.zip
          Write-Host "Node.js portable downloaded"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

      - name: Build Electron app (portable)
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-exe
          path: dist/*.exe
          retention-days: 30
